<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyun Dünyası | İki Oyun Bir Arada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        /* Üst Menü */
        header {
            background-color: #1a1a1a;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff9f43;
            text-decoration: none;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        /* Giriş Ekranı (Karşılama) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #24243e 0%, #0f0c1b 100%);
            padding: 20px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.7);
        }

        .hero p {
            font-size: 1.3rem;
            color: #cccccc;
            margin-bottom: 30px;
        }

        .btn-play {
            background-color: #ff9f43;
            color: #121212;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-play:hover {
            background-color: #ff5e3a;
            color: white;
            transform: translateY(-3px);
        }

        /* Oyunlar Bölümü Izgarası */
        .games-section {
            padding: 120px 20px;
            text-align: center;
            background-color: #121212;
            min-height: 100vh;
        }

        .games-section h2 {
            font-size: 2.8rem;
            margin-bottom: 50px;
            color: #ff9f43;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
            align-items: start;
        }

        /* Ortak Oyun Kartı Tasarımı */
        .game-card {
            background-color: #1e1e1e;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 159, 67, 0.1);
        }

        .game-card h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #ff9f43;
        }

        /* 1. OYUN: TIKLAMA OYUNU */
        .click-game-area {
            background-color: #16161a;
            transition: background-color 0.4s ease;
        }

        .score-board {
            font-size: 2rem;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
        }

        .click-btn {
            background-color: #ff9f43;
            color: #121212;
            border: none;
            padding: 20px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 159, 67, 0.3);
            transition: transform 0.1s, background-color 0.2s;
        }

        .click-btn:active { transform: scale(0.95); }
        .click-btn:hover { background-color: #ff5e3a; color: white; }

        /* 2. OYUN: SATRANÇ */
        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1;
            border: 4px solid #333;
            margin-bottom: 15px;
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            cursor: pointer;
            user-select: none;
        }

        .white-square { background-color: #f0d9b5; }
        .black-square { background-color: #b58863; }
        .square.selected { background-color: #7ab873 !important; }

        .status-text {
            font-size: 1.2rem;
            margin: 15px 0;
        }

        .btn-reset {
            background-color: #ff9f43;
            color: #121212;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-reset:hover { background-color: #ff5e3a; color: white; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">🎮 OYUN DÜNYASI</a>
        <nav><a href="#oyunlar">Oyunlar</a></nav>
    </header>

    <section class="hero">
        <h1>Oyun Siteme Hoş Geldin! 🚀</h1>
        <p>Tıklama ve Satranç oyunlarımız hemen aşağıda seni bekliyor.</p>
        <a href="#oyunlar" class="btn-play">Oyunları Keşfet 👇</a>
    </section>

    <section id="oyunlar" class="games-section">
        <h2>Oyun Alanı</h2>
        
        <div class="games-grid">
            
            <div id="clickGameCard" class="game-card click-game-area">
                <h3>Tıklama Oyunu</h3>
                <div class="score-board">Skor: <span id="score" style="color: #ff9f43;">0</span></div>
                <button class="click-btn" onclick="increaseScore()">BANA TIKLA!</button>
                <p style="margin-top: 15px; color: #aaa; font-size: 0.9rem;">Her 10 skorda bir arka plan değişir!</p>
            </div>

            <div class="game-card">
                <h3>Satranç Oyunu</h3>
                <p class="status-text">Sıra: <span id="turn-text" style="color: #ff9f43; font-weight: bold;">Beyazda</span></p>
                
                <div id="board" class="chessboard"></div>
                
                <button class="btn-reset" onclick="resetGame()">Oyunu Yeniden Başlat</button>
            </div>

        </div>
    </section>

    <script>
        // --- 1. TIKLAMA OYUNU LOGIC ---
        let score = 0;
        const clickBgColors = ['#16161a', '#1e3c72', '#11998e', '#7F00FF', '#ff5e62'];

        function increaseScore() {
            score++;
            document.getElementById('score').textContent = score;

            if (score % 10 === 0) {
                const randomColor = clickBgColors[Math.floor(Math.random() * clickBgColors.length)];
                document.getElementById('clickGameCard').style.backgroundColor = randomColor;
            }
        }

        // --- 2. SATRANÇ OYUNU LOGIC ---
        const initialBoard = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        const piecesSymbols = {
            'R': '♜', 'N': '♞', 'B': '♝', 'Q': '♛', 'K': '♚', 'P': '♟',
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟'
        };

        const pieceColors = {
            'R': 'w', 'N': 'w', 'B': 'w', 'Q': 'w', 'K': 'w', 'P': 'w',
            'r': 'b', 'n': 'b', 'b': 'b', 'q': 'b', 'k': 'b', 'p': 'b'
        };

        let currentBoard = JSON.parse(JSON.stringify(initialBoard));
        let turn = 'w'; 
        let selectedSquare = null;

        const boardElement = document.getElementById('board');
        const turnText = document.getElementById('turn-text');

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    const isBlackSquare = (r + c) % 2 === 1;
                    square.classList.add('square', isBlackSquare ? 'black-square' : 'white-square');
                    
                    const piece = currentBoard[r][c];
                    if (piece) {
                        square.textContent = piecesSymbols[piece];
                        square.style.color = pieceColors[piece] === 'w' ? '#ffffff' : '#000000';
                    }

                    if (selectedSquare && selectedSquare.row === r && selectedSquare.col === c) {
                        square.classList.add('selected');
                    }

                    square.addEventListener('click', () => onSquareClick(r, c));
                    boardElement.appendChild(square);
                }
            }
        }

        function onSquareClick(r, c) {
            const piece = currentBoard[r][c];

            if (selectedSquare) {
                if (selectedSquare.row === r && selectedSquare.col === c) {
                    selectedSquare = null;
                    createBoard();
                    return;
                }

                // Taşı taşı
                currentBoard[r][c] = currentBoard[selectedSquare.row][selectedSquare.col];
                currentBoard[selectedSquare.row][selectedSquare.col] = '';
                selectedSquare = null;
                
                // Sıra değişimi
                turn = turn === 'w' ? 'b' : 'w';
                turnText.textContent = turn === 'w' ? 'Beyazda' : 'Siyahda';
                turnText.style.color = turn === 'w' ? '#ff9f43' : '#a2a2a2';
                
                createBoard();
            } else {
                if (piece && pieceColors[piece] === turn) {
                    selectedSquare = { row: r, col: c };
                    createBoard();
                }
            }
        }

        function resetGame() {
            currentBoard = JSON.parse(JSON.stringify(initialBoard));
            turn = 'w';
            selectedSquare = null;
            turnText.textContent = 'Beyazda';
            turnText.style.color = '#ff9f43';
            createBoard();
        }

        // Başlangıçta tahtayı yükle
        createBoard();
    </script>
</body>
</html>
