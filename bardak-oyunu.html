<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bardağı Taşırma!</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
        }

        #game-container {
            position: relative;
            width: 200px;
            height: 300px;
            border: 5px solid #333;
            border-top: none;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            background-color: #fff;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #water {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background-color: #3498db;
            transition: height 0.1s ease;
        }

        #line {
            position: absolute;
            top: 40px; /* Kaybetme çizgisi */
            width: 100%;
            border-top: 3px dashed #e74c3c;
            display: none; /* İstersen çizgiyi görünür yapabilirsin */
        }

        .btn {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 18px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #555;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <h1>Bardağı Doldur!</h1>
    <p>Butona basılı tutarak bardağı doldur. Suyu taşıran kaybeder!</p>
    
    <div id="game-container">
        <div id="line"></div>
        <div id="water"></div>
    </div>

    <button id="fill-btn" class="btn">Su Doldur (Basılı Tut)</button>
    <div id="status">Sıra: Oyuncu 1</div>

    <script>
        const water = document.getElementById('water');
        const fillBtn = document.getElementById('fill-btn');
        const statusText = document.getElementById('status');
        
        let waterLevel = 0;
        let isPressing = false;
        let intervalId = null;
        let currentPlayer = 1;
        let gameOver = false;

        // Rastgele bir taşma noktası belirliyoruz (yüzde 85 ile 98 arası)
        // Böylece her oyunda bardağın ne zaman taşacağı biraz sürpriz oluyor!
        const maxLimit = Math.floor(Math.random() * (98 - 85 + 1)) + 85;

        function startFilling() {
            if (gameOver) return;
            isPressing = true;
            
            intervalId = setInterval(() => {
                if (!isPressing) return;
                
                // Her adımda bardağa biraz su ekle
                waterLevel += 0.8; 
                water.style.height = waterLevel + '%';

                // Taşma kontrolü
                if (waterLevel >= maxLimit) {
                    endGame();
                }
            }, 20);
        }

        function stopFilling() {
            if (gameOver || !isPressing) return;
            isPressing = false;
            clearInterval(intervalId);
            
            // Sırayı diğer oyuncuya geçir
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            statusText.innerText = `Sıra: Oyuncu ${currentPlayer}`;
            statusText.style.color = "#555";
        }

        function endGame() {
            isPressing = false;
            gameOver = true;
            clearInterval(intervalId);
            water.style.backgroundColor = '#e74c3c'; // Suyu kırmızı yap
            statusText.innerText = `💥 Oyuncu ${currentPlayer} Suyu Taşırdı! Kaybettin!`;
            statusText.style.color = "#e74c3c";
            fillBtn.innerText = "Yeniden Başlat";
            
            // Butonun işlevini yeniden başlatma olarak değiştir
            fillBtn.removeEventListener('mousedown', startFilling);
            fillBtn.removeEventListener('touchstart', startFilling);
            fillBtn.onclick = resetGame;
        }

        function resetGame() {
            location.reload(); // Sayfayı yenileyerek oyunu sıfırla
        }

        // Fare (PC) kontrolleri
        fillBtn.addEventListener('mousedown', startFilling);
        window.addEventListener('mouseup', stopFilling);

        // Dokunmatik (Mobil) kontrolleri
        fillBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startFilling();
        });
        window.addEventListener('touchend', stopFilling);

    </script>
</body>
</html>
